<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repair Hub</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
}

/* HEADER */
.header {
  background: linear-gradient(135deg,#5f2eea,#7b61ff);
  color: white;
  padding: 20px;
}

.header h2 {
  margin: 0;
}

.top-info {
  font-size: 14px;
  margin-top: 5px;
}

/* SEARCH */
.search-box input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

/* BANNER */
.banner {
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  color: white;
  background: linear-gradient(135deg,#ff7a18,#ffb347);
}

/* SERVICES */
.section {
  padding: 15px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.card img {
  width: 60px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 20px;
  border-radius: 20px 20px 0 0;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: #5f2eea;
  color: white;
  border: none;
  border-radius: 10px;
}

/* FLOAT */
.call {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: red;
  color: white;
  padding: 15px;
  border-radius: 50%;
}

.whatsapp {
  position: fixed;
  bottom: 80px;
  right: 20px;
  background: green;
  color: white;
  padding: 15px;
  border-radius: 50%;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px;
}
</style>
</head>

<body>

<div class="header">
  <h2>Repair Hub Appliance Services</h2>
  <div class="top-info">📞 9804567074 | Kolkata</div>

  <div class="search-box">
    <input type="text" placeholder="Search AC, Fridge...">
  </div>
</div>

<div class="banner">
  ⚡ Service in 30 Minutes | Trusted Technician
</div>

<div class="section">
  <h3>Services</h3>

  <div class="grid">

    <div class="card" onclick="openForm('AC Repair')">
      <img src="https://cdn-icons-png.flaticon.com/512/1048/1048314.png">
      <p>AC Repair</p>
    </div>

    <div class="card" onclick="openForm('Fridge Repair')">
      <img src="https://cdn-icons-png.flaticon.com/512/1046/1046857.png">
      <p>Fridge</p>
    </div>

    <div class="card" onclick="openForm('Washing Machine')">
      <img src="https://cdn-icons-png.flaticon.com/512/1685/1685173.png">
      <p>Washing Machine</p>
    </div>

    <div class="card" onclick="openForm('Microwave')">
      <img src="https://cdn-icons-png.flaticon.com/512/2921/2921822.png">
      <p>Microwave</p>
    </div>

    <div class="card" onclick="openForm('Geyser')">
      <img src="https://cdn-icons-png.flaticon.com/512/1685/1685099.png">
      <p>Geyser</p>
    </div>

  </div>
</div>

<!-- FORM -->
<div class="modal" id="formBox">
  <h3 id="serviceName"></h3>

  <input type="text" placeholder="Name">
  <input type="text" placeholder="Phone">
  <textarea placeholder="Problem"></textarea>

  <button onclick="sendWhatsApp()">Book Now</button>
</div>

<a href="tel:9804567074" class="call">📞</a>
<a href="#" class="whatsapp" onclick="sendWhatsApp()">💬</a>

<div class="nav">
  <div>🏠 Home</div>
  <div>🛠 Services</div>
  <div onclick="sendWhatsApp()">📞 Book</div>
  <div>👤 Account</div>
</div>

<script>
let service = "";

function openForm(s){
  service = s;
  document.getElementById("formBox").style.display="block";
  document.getElementById("serviceName").innerText = s;
}

function sendWhatsApp(){
  let url = "https://wa.me/919804567074?text=Service:%20"+service;
  window.open(url);
}
</script>

</body>
</html>
